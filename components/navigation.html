              mobileLinks.forEach((link) => {
                link.addEventListener("click", () => toggleMenu(false))
              })

              // Handle ESC key
              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && mobileOverlay.classList.contains("is-active")) {
                  toggleMenu(false)
                }
              })

              // Simple scroll effect for nav bar
              let lastScroll = 0
              const nav = document.getElementById("main-nav")

              window.addEventListener("scroll", () => {
                const currentScroll = window.pageYOffset

                if (currentScroll > 50) {
                  nav.style.boxShadow = "var(--shadow-level-2)"
                  nav.style.background = "color-mix(in oklab, var(--color-surface) 98%, black)"
                } else {
                  nav.style.boxShadow = "none"
                  nav.style.background = "var(--color-surface)"
                }

                lastScroll = currentScroll
              })
            })()
          });
        </script>
      </div>
    </div>
  </div>
</div>
